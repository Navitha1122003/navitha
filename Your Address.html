/* Base styles for larger screens */
.navbar {
    background: linear-gradient(45deg,#f1bb3d,#C62E2E); /* Orange background */
    color: #000080; /* Dark blue text */
    padding: 10px;
    display: flex;
    /* justify-content: space-around; */
    align-items: center;
    padding-left: 5%;
    font-size: 20px;
}

.navbar a {
    color: #000080;
    text-decoration: none;
    margin: 0 10px;
}

.search-container {
    display: flex;
}

.search-container input[type="text"] {
    padding: 5px;
    border: 1px solid #ccc;
}

.search-container button {
    padding: 5px 10px;
    background-color: #ddd;
    border: none;
    cursor: pointer;
}

/* Media query for screens smaller than 768px (typical for tablets) */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        align-items: flex-start;
    }

    .navbar a {
        margin: 5px 0;
    }

    .search-container {
        width: 100%;
        margin-top: 10px;
    }

    .search-container input[type="text"] {
        width: calc(100% - 70px); /* Adjust width for button */
    }
}

/* Media query for screens smaller than 480px (typical for mobile phones) */
@media (max-width: 480px) {
    .navbar {
        padding: 5px;
    }

    .navbar a {
        font-size: 0.9em;
        margin: 3px 0;
    }

    .search-container button {
        padding: 5px;
    }
}
